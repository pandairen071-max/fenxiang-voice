<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MV详情 - 分享圣乐团</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-logo" onclick="location.href='/'">🎵 分享圣乐团</div>
    <ul class="navbar-links" id="navLinks">
      <li><a href="/">首页</a></li>
      <li><a href="/mv" class="active">MV作品</a></li>
      <li><a href="/audio">音频</a></li>
      <li><a href="/accompaniment">伴奏</a></li>
      <li><a href="/sheets">乐谱</a></li>
    </ul>
    <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
  </nav>

  <main class="detail-page">
    <a href="/mv" class="detail-back">← 返回MV列表</a>
    <div id="content">
      <div class="loading-spinner"></div>
    </div>
  </main>

  <script src="/js/player.js"></script>
  <script>
    document.getElementById('menuToggle').onclick = () => document.getElementById('navLinks').classList.toggle('open');

    const id = location.pathname.split('/')[2];

    fetch(`/api/mv/${id}`)
      .then(r => r.json())
      .then(mv => {
        const ext = mv.file_path.split('.').pop().toLowerCase();
        const isVideoFile = ['mp4', 'webm', 'mov', 'avi'].includes(ext);

        document.getElementById('content').innerHTML = `
          <div class="video-player">
            ${isVideoFile
              ? `<video src="/uploads/${mv.file_path}" controls autoplay></video>`
              : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000;color:var(--color-text-secondary);">
                  <div style="text-align:center;">
                    <div style="font-size:3rem;margin-bottom:12px;">🎬</div>
                    <p>视频文件: ${mv.file_path}</p>
                  </div>
                </div>`
            }
          </div>
          <h1 class="detail-title">${mv.title}</h1>
          <div class="detail-meta">${mv.artist_name} · ${new Date(mv.created_at).toLocaleDateString('zh-CN')}</div>
          ${mv.description ? `<p class="detail-desc">${mv.description}</p>` : ''}
        `;
      })
      .catch(() => {
        document.getElementById('content').innerHTML = '<div class="empty-state"><p>加载失败</p></div>';
      });

    window.player = new GlobalPlayer();
  </script>
    });
  }
</body>
</html>
