version: '3.8'

services:
  app:
    build: .
    restart: always
    ports:
      - "3001:3001"
    volumes:
      # 持久化上传文件和数据库
      - ./data/uploads:/app/public/uploads
      - ./data/db:/app/db
    environment:
      - NODE_ENV=production
      - PORT=3001

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - app
